<!doctype html>
<html data-theme="light">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tektur:wght@400;700&family=Exo+2:wght@400;700&family=Turret+Road:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/general.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/menu.css" />
    <link rel="stylesheet" href="styles/memory-buttons.css" />
    <link rel="stylesheet" href="styles/keys.css" />
    <link rel="stylesheet" href="styles/history.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <header>
      <div class="left-section">Calculator</div>
      <div class="right-section-container">
        <div id="minimize" class="right-section"></div>
        <div id="maximize" class="right-section"></div>
        <div id="close" class="right-section"></div>
      </div>
    </header>
    <div class="menu">
      <div id="theme-toggle" class="ham-menu"></div>
      <p class="standard-text">Standard</p>
      <div class="minimize-icon"></div>
    </div>
    <div id="result">0</div>
    <div class="memory-buttons-container">
      <button id="mc" onclick="memoryClear()" class="disable-memory-button">
        MC
      </button>
      <button id="mr" onclick="memoryRecall()" class="disable-memory-button">
        MR
      </button>
      <button id="mplus" onclick="memoryAdd()" class="enable-memory-button">
        M+
      </button>
      <button
        id="mminus"
        onclick="memorySubtract()"
        class="enable-memory-button"
      >
        M-
      </button>
      <button id="ms" onclick="memoryStore()" class="enable-memory-button">
        MS
      </button>
    </div>
    <div class="keys">
      <div onclick="percent()" id="percentage" class="functional-key">
        &#37;
      </div>
      <div onclick="clearAll()" id="c" class="functional-key">C</div>
      <div onclick="clearEntry()" id="ce" class="functional-key">CE</div>
      <div
        onclick="backspace()"
        id="backspace-outline"
        class="functional-key"
      ></div>
      <div onclick="press('/')" id="division" class="functional-key"></div>
      <div onclick="squareRoot()" id="square-root" class="functional-key"></div>
      <div onclick="press('7')" id="seven" class="number">7</div>
      <div onclick="press('8')" id="eight" class="number">8</div>
      <div onclick="press('9')" id="nine" class="number">9</div>
      <div
        onclick="press('*')"
        id="multiplication"
        class="functional-key"
      ></div>
      <div onclick="square()" id="x2" class="functional-key"></div>
      <div onclick="press('4')" id="four" class="number">4</div>
      <div onclick="press('5')" id="five" class="number">5</div>
      <div onclick="press('6')" id="six" class="number">6</div>
      <div onclick="press('-')" id="minus" class="functional-key"></div>
      <div onclick="cube()" id="x3" class="functional-key"></div>
      <div onclick="press('1')" id="one" class="number">1</div>
      <div onclick="press('2')" id="two" class="number">2</div>
      <div onclick="press('3')" id="three" class="number">3</div>
      <div onclick="press('+')" id="plus" class="functional-key"></div>
      <div onclick="reciprocal()" id="x1" class="functional-key"></div>
      <div onclick="changeSign()" id="change-sign" class="functional-key"></div>
      <div onclick="press('0')" id="zero" class="number">0</div>
      <div onclick="press('.')" id="dot" class="functional-key">
        <strong>.</strong>
      </div>
      <div onclick="equals()" id="equals" class="functional-key"></div>
    </div>
    <div class="history">
      <div class="history-button-container">
        <div id="historyTab" class="history-button">History</div>
        <div id="memoryTab" class="history-button">Memory</div>
      </div>

      <!-- HISTORY PANEL -->
      <div id="historyPanel" class="history-text">
        There is no history here yet
      </div>

      <!-- MEMORY PANEL (hidden by default) -->
      <div id="memoryPanel" class="history-text" style="display: none">
        Memory is empty
      </div>

      <div class="trash-bin" onclick="clearHistory()"></div>
    </div>
    <script src="scripts/state.js"></script>
    <script src="scripts/theme.js"></script>
    <script src="scripts/calculation.js"></script>
    <script src="scripts/memory.js"></script>
    <script src="scripts/history.js"></script>
    <script src="scripts/window-controls.js"></script>
  </body>
</html>
